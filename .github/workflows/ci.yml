name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "dev-v*"

jobs:
  test-build-smoke:
    name: Test, build, and smoke install
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=68" wheel
          python -m pip install -e ".[dev]" build twine

      - name: Run tests
        run: python -m pytest tests -p no:cacheprovider --basetemp .pytest_tmp

      - name: Check CLI version
        run: python -m chamanp.cli --version

      - name: Check public import boundary
        run: python -c "import chamanp; print(chamanp.__version__, chamanp.__all__, hasattr(chamanp, 'Pipeline'))"

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Smoke install built wheel
        shell: bash
        run: |
          set -euo pipefail
          WHEEL="$(ls dist/*.whl | head -n 1)"
          python -m venv .smoke_venv
          .smoke_venv/bin/python -m pip install --upgrade pip
          .smoke_venv/bin/python -m pip install "$WHEEL"
          mkdir -p .smoke_outside_checkout
          cd .smoke_outside_checkout
          ../.smoke_venv/bin/chamanp --version
          ../.smoke_venv/bin/python -c "import chamanp; print(chamanp.__version__, chamanp.__all__, hasattr(chamanp, 'Pipeline'))"
